name: sathi
description: A warm MVP Flutter app for Nepalese students abroad.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  record: ^6.2.0
  audioplayers: ^6.1.0
  share_plus: ^10.0.2
  http: ^1.2.2
  home_widget: ^0.8.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
